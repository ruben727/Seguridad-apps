<p-toast></p-toast>

<div class="flex justify-content-center align-items-center min-h-screen surface-ground">

  <p-card [style]="{ width: '420px' }">

    <div class="flex flex-column align-items-center gap-2 mb-4">
      <i class="pi pi-lock text-primary" style="font-size:2.5rem"></i>
      <h2 class="m-0">Iniciar Sesión</h2>
    </div>

    <div class="flex flex-column gap-4">

      @if (errorMsg) {
        <p-message severity="error" [text]="errorMsg"></p-message>
      }

      <!-- EMAIL -->
      <p-floatlabel>
        <input
          pInputText
          [(ngModel)]="email"
          class="w-full"
        />
        <label>Correo electrónico</label>
      </p-floatlabel>

      <!-- PASSWORD -->
      <p-floatlabel>
        <p-password
          [(ngModel)]="password"
          [toggleMask]="true"
          [feedback]="false"
          styleClass="w-full">
        </p-password>
        <label>Contraseña</label>
      </p-floatlabel>

      <p-button
        label="Iniciar Sesión"
        icon="pi pi-sign-in"
        class="w-full"
        (onClick)="iniciarSesion()">
      </p-button>

      <p-button
        label="¿No tienes cuenta? Regístrate"
        variant="text"
        class="w-full"
        routerLink="/registro">
      </p-button>

    </div>

  </p-card>

</div>
