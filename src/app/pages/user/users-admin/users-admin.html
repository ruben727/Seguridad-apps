<div style="display:flex;height:100vh">

<div style="width:250px">
<app-sidebar></app-sidebar>
</div>

<div style="flex:1;padding:20px">

<h2>Gestión de Usuarios</h2>

<p-table [value]="users">

<ng-template pTemplate="header">

<tr>

<th>Usuario</th>
<th>Email</th>
<th>Rol</th>

<th *ngFor="let p of permissions">
{{p}}
</th>

</tr>

</ng-template>

<ng-template pTemplate="body" let-user>

<tr>

<td>{{user.name}}</td>
<td>{{user.email}}</td>
<td>{{user.role}}</td>

<td *ngFor="let p of permissions">

<p-checkbox

[disabled]="user.role==='superAdmin'"

[ngModel]="user.permissions.includes(p)"

(onChange)="togglePermission(user,p)">

</p-checkbox>

</td>

</tr>

</ng-template>

</p-table>

</div>

</div>
